[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

# Astro emits fully-optimized hashed assets; skip Netlify's post-processing.
[build.processing]
  skip_processing = true

# Global response headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1"
    # img-src: media.giphy.com = scratch-card stickers, cdn.jsdelivr.net = skill icons
    # connect-src: jogruber = GitHub heatmap data, api.github.com = navbar star count
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://media.giphy.com https://cdn.jsdelivr.net; font-src 'self'; connect-src 'self' https://github-contributions-api.jogruber.de https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-DNS-Prefetch-Control = "on"

# Immutable hashed build assets (1 year)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images (1 day + stale-while-revalidate)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# SEO/AEO/GEO files — short cache, always revalidate
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type = "application/manifest+json"
